name: Python Script Workflow

on: [push]

jobs:
  run-python-script:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Set up Python
        uses: actions/setup-python@v5 
        with:
          python-version: '3.10'
      
      - name: pip install
        run: pip install pytest 

      - name: Run Python test
        run: pytest 

      - name: Run Python script
        run: python main.py